<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>l4st</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
        }
        #clickArea {
            position: fixed;
            z-index: 999;
            width: 100%;
            height: 100%;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .ani {
            color: white;
            font-size: 1.2rem;
            letter-spacing: 5px;
            animation: pulse 2s infinite;
            text-transform: uppercase;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.1; }
            100% { opacity: 1; }
        }
        #content {
            display: none;
            width: 100%;
            height: 100vh;
        }
        #myVideo {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            object-fit: cover;
            filter: brightness(0.5);
        }
        .mainbox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            text-align: center;
            z-index: 1;
        }
        .foto {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 {
            font-size: 28px;
            font-weight: bold;
            margin: 0;
        }
        h2 {
            font-size: 14px;
            color: #8a8a8a;
            margin-top: 5px;
            font-style: italic;
        }
        .boxicons {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .boxicons a {
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }
        .boxicons a:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 5px white);
        }
        .mainop {
            margin-top: 20px;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }
    </style>
</head>
<body>
    <div id="clickArea">
        <span class="ani">click here</span>
    </div>
    <div id="content">
        <video autoplay muted loop id="myVideo">
            <source src="https://i.imgur.com/83pZ709.mp4" type="video/mp4">
        </video>
        <div class="mainbox">
            <img src="https://github.com/l4st98.png" class="foto">
            <h1>l4st</h1>
            <h2>"Ethical hacker • 14 years old"</h2>
            <div class="boxicons">
                <a href="https://x.com/l4st1337" target="_blank">
                    <svg class="mail" xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M12.6.75h2.454l-5.36 6.142L16 15.25h-4.937l-3.867-5.07-4.425 5.07H.316l5.733-6.57L0 .75h5.063l3.495 4.633L12.601.75Zm-.86 13.028h1.36L4.323 2.145H2.865z"/>
                    </svg>
                </a>
                <a href="https://github.com/l4st98" target="_blank">
                    <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
                    </svg>
                </a>
            </div>
            <div class="mainop"></div>
        </div>
    </div>
    <audio preload="auto" loop id="audio">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>
    <script>
        document.getElementById('clickArea').onclick = function() {
            document.getElementById('clickArea').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            var audio = document.getElementById('audio');
            if (audio) { audio.play(); }
        }
        var titles = ["l4st", "Ethical Hacker", "@l4st1337"];
        var i = 0;
        setInterval(function() {
            document.title = titles[i];
            i = (i + 1) % titles.length;
        }, 1500);
    </script>
</body>
    </html>
