<!DOCTYPE html>
<html lang="pt-br">
<!-- Desculpa miz kkkkkkk -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>l4st | Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            color: white;
        }

        #myVideo {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            filter: brightness(0.4); 
            object-fit: cover;
        }

        
        #clickArea {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            cursor: pointer;
        }

        .ani {
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fff;
            animation: pulse 2s infinite;
        }

        
        #content {
            display: none; 
            height: 100vh;
        }

        .mainbox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 45px 30px;
            border-radius: 15px;
            text-align: center;
            width: 350px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease-in-out;
        }

        .foto {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
            object-fit: cover;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        h2 {
            font-size: 14px;
            color: #888;
            font-weight: 400;
            margin-bottom: 25px;
        }

        
        .boxicons {
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .boxicons a {
            color: #fff;
            transition: 0.3s;
            opacity: 0.7;
        }

        .boxicons a:hover {
            opacity: 1;
            transform: scale(1.2);
        }

      
        @keyframes pulse {
            0% { opacity: 0.2; }
            50% { opacity: 1; }
            100% { opacity: 0.2; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -45%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }
    </style>
</head>
<body>

    <div id="clickArea">
        <span class="ani">clique aqui</span>
    </div>

    <div id="content">
        <video autoplay muted loop id="myVideo">
            <source src="https://i.imgur.com/83pZ709.mp4" type="video/mp4">
        </video>

        <div class="mainbox">
            <img src="https://github.com/l4st98.png" class="foto">
            
            <h1>l4st</h1>
            <h2>"Ethical Hacker • Estudante de Cibersegurança e de Programação • 14 years old"</h2>

            <div class="boxicons">
                <a href="https://x.com/l4st1337" target="_blank">
                    <svg width="25" height="25" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M12.6.75h2.454l-5.36 6.142L16 15.25h-4.937l-3.867-5.07-4.425 5.07H.316l5.733-6.57L0 .75h5.063l3.495 4.633L12.601.75Zm-.86 13.028h1.36L4.323 2.145H2.865z"/>
                    </svg>
                </a>

                <a href="https://github.com/l4st98" target="_blank">
                    <svg width="25" height="25" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
                    </svg>
                </a>
            </div>
        </div>
    </div>

    <audio id="audio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const clickArea = document.getElementById('clickArea');
        const content = document.getElementById('content');
        const audio = document.getElementById('audio');

        clickArea.onclick = function() {
            clickArea.style.opacity = '0';
            setTimeout(() => {
                clickArea.style.display = 'none';
                content.style.display = 'block';
                
            }, 500);
        }

     
        let titles = ["l4st", "Ethical Hacker", "@l4st1337"];
        let index = 0;
        setInterval(() => {
            document.title = titles[index];
            index = (index + 1) % titles.length;
        }, 2000);
    </script>
</body>
</html>
